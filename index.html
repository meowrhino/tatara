<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- El sitio es negro-sobre-blanco: opt-out del modo oscuro forzado del navegador -->
  <meta name="color-scheme" content="light">
  <title>TAT ARA</title>
  <meta name="description" content="TAT ARA — espai galeria d'art, disseny i ecologia.">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Barra superior fija: menú · TAT · carret -->
  <header class="bar bar--top">
    <button class="bar__menu" id="open-menu" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="menu">menú</button>
    <a class="bar__brand" id="brand-home" href="#">TAT</a>
    <a class="bar__cart" id="cart-link" href="#carret" aria-label="carret">
      <img class="bar__cart-icon" src="assets/icons/carrito.png" alt="" aria-hidden="true">
      <span class="bar__cart-count" id="cart-count" aria-hidden="true"></span>
    </a>
  </header>

  <!-- Vista activa (la rellena el router según el hash) -->
  <main id="view" aria-live="polite">
    <p class="loading">carregant…</p>
  </main>

  <!-- Barra inferior fija: secció · ARA · idioma (mòbil: actiu→modal; escriptori: cat es en) -->
  <footer class="bar bar--bottom">
    <button class="bar__section" id="bar-section" type="button" aria-haspopup="true" aria-controls="menu"></button>
    <span class="bar__brand bar__brand--foot">ARA</span>
    <div class="bar__langbox">
      <div class="bar__langs" role="group" aria-label="Idioma" id="footer-langs"><!-- escriptori: la rellena el router --></div>
      <button class="bar__lang" id="lang-toggle" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="lang-modal" aria-label="Idioma"></button>
    </div>
  </footer>

  <!-- Modal d'idioma -->
  <div class="langmodal" id="lang-modal" aria-hidden="true">
    <div class="langmodal__backdrop" data-lang-close></div>
    <div class="langmodal__dialog" role="dialog" aria-modal="true" aria-label="Idioma">
      <div class="langmodal__list" id="lang-list"><!-- la rellena el router --></div>
    </div>
  </div>

  <!-- Menú overlay -->
  <nav class="menu" id="menu" aria-label="Menú" aria-hidden="true">
    <div class="menu__head">
      <span class="menu__title">tataramenú</span>
      <button class="menu__close" id="close-menu" type="button" aria-label="Tancar">
        <svg viewBox="0 0 40 40" width="34" height="34" aria-hidden="true">
          <path d="M7 9 Q19 19 33 31 M33 8 Q20 20 8 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <ul class="menu__list" id="menu-list"><!-- la rellena el router --></ul>

    <div class="menu__langs" role="group" aria-label="Idioma" id="menu-langs"><!-- la rellena el router --></div>
  </nav>

  <!-- Modal de detalle (eventos / productos) -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal__close" type="button" data-close aria-label="Tancar">
        <svg viewBox="0 0 40 40" width="30" height="30" aria-hidden="true">
          <path d="M7 9 Q19 19 33 31 M33 8 Q20 20 8 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
