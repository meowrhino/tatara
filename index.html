<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TAT ARA</title>
  <meta name="description" content="TAT ARA — espai galeria d'art, disseny i ecologia.">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Vista activa (la rellena el router según el hash) -->
  <main id="view" aria-live="polite">
    <p class="loading">carregant…</p>
  </main>

  <!-- Barra inferior fija -->
  <footer class="bar">
    <span class="bar__left" id="bar-studio">tatara studio</span>
    <button class="bar__menu" id="open-menu" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="menu">menú</button>
  </footer>

  <!-- Menú overlay -->
  <nav class="menu" id="menu" aria-label="Menú" aria-hidden="true">
    <div class="menu__head">
      <span class="menu__title">tataramenú</span>
      <button class="menu__close" id="close-menu" type="button" aria-label="Tancar">
        <svg viewBox="0 0 40 40" width="34" height="34" aria-hidden="true">
          <path d="M7 9 Q19 19 33 31 M33 8 Q20 20 8 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <ul class="menu__list" id="menu-list"><!-- la rellena el router --></ul>

    <svg class="menu__cart-doodle" viewBox="0 0 90 60" width="78" height="52" aria-hidden="true">
      <path d="M4 12 H18 L26 40 H66 L74 18 H22 M30 40 Q36 40 36 46 M58 40 Q64 40 64 46"
            fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="34" cy="52" r="3.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="60" cy="52" r="3.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
    </svg>

    <div class="menu__langs" role="group" aria-label="Idioma" id="menu-langs"><!-- la rellena el router --></div>
  </nav>

  <!-- Modal de detalle (eventos / productos) -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal__close" type="button" data-close aria-label="Tancar">
        <svg viewBox="0 0 40 40" width="30" height="30" aria-hidden="true">
          <path d="M7 9 Q19 19 33 31 M33 8 Q20 20 8 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
